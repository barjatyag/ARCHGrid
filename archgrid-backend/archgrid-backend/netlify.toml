# ─────────────────────────────────────────────────────────────
# ARCHGrid AI — Netlify Configuration
# File: netlify.toml
#
# Place this in the ROOT of your GitHub repository.
# Netlify reads it automatically on every deploy.
# ─────────────────────────────────────────────────────────────

[build]
  # Your main HTML file — rename to index.html in your repo
  publish = "."

  # Install dependencies for serverless functions
  command = "cd netlify/functions && npm install"

[build.environment]
  NODE_VERSION = "18"

# ── Serverless Functions ──
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ── Redirect rules ──
# Stripe success/cancel pages redirect back to main app
[[redirects]]
  from = "/success"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/reset-password"
  to = "/index.html"
  status = 200

# All unmatched routes → index.html (SPA behaviour)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Protect function endpoints
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://archgrid.io"
